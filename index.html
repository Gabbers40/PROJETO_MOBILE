<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link href=Calculadora.css rel = stylesheet>
</head>
<body>
    <div class = "body">
        <div class = "container">
            <div class = "header-container">
                <h1 id="toast">Calculadora</h1>
            </div>
            <div class="calci">
                <div class = "primeira">
                    <input type="text" name="resultado" id="result" placeholder="Resultado" readonly />
                    <input type="button" value="C" onclick="res.value=''" id="clear-button" />
                </div>
                <div class="segunda">
                    <input type="button" value="1" onclick="livescreen(1)"/>
                    <input type="button" value="2" onclick="livescreen(2)"/>
                    <input type="button" value="3" onclick="livescreen(3)"/>
                    <input type="button" value="+" onclick="livescreen('+')"/>
                </div>
                <div class = "terceira">
                    <input type="button" value="4" onclick="livescreen(4)"/>
                    <input type="button" value="5" onclick="livescreen(5)"/>
                    <input type="button" value="6" onclick="livescreen(6)"/>
                    <input type="button" value="-" onclick="livescreen('-')"/>
                </div>
                <div class = "quarta">
                    <input type="button" value="7" onclick="livescreen(7)"/>
                    <input type="button" value="8" onclick="livescreen(8)"/>
                    <input type="button" value="9" onclick="livescreen(9)"/>
                    <input type="button" value="*" onclick="livescreen('*')"/>
                </div>
                <div class = "quinta">
                    <input type="button" value="/" onclick="livescreen('/')"/>
                    <input type="button" value="0" onclick="livescreen(0)"/>
                    <input type="button" value="." onclick="livescreen('.')"/>
                    <input type="button" value="=" onclick="calculate()"/>
                </div>
                <div class = "sexta">
                    <input type="button" value="," onclick="livescreen(',')"/>
                    <input type = "button" value="M" onclick="calcularmedia()"/>
                    <input type = "button" value="B" onclick="calcularBhaskara()"/>
                    <input type = "button" value="P" onclick="calcularParouImpar()"/>
                </div>
            </div>
        </div>
    </div>
    <script src =script.js defer>
    </script>
</body>
</html>
